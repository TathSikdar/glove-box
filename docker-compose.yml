version: "3.8"

services:
  glovebox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glovebox-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - DATABASE_PATH=/app/data/database.sqlite
      - UPLOADS_PATH=/app/data/uploads
      - NODE_ENV=production
